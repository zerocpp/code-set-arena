services:
  codesetarena-student:
    build:
      context: .
      dockerfile: docker/student/Dockerfile
    image: codesetarena-student:v7.1.9
    ports:
      - "8000:8000"
    volumes:
      - codesetarena-student-data:/data

  codesetarena-teacher:
    build:
      context: .
      dockerfile: docker/teacher/Dockerfile
    image: codesetarena-teacher:v7.1.9
    ports:
      - "8010:8010"
    volumes:
      - codesetarena-teacher-data:/data

  codesetarena-runtime:
    build:
      context: .
      dockerfile: docker/runtime/Dockerfile
    image: codesetarena-runtime:v7.1.9
    network_mode: "none"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=256m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

volumes:
  codesetarena-student-data:
  codesetarena-teacher-data:
